<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treatonomics | Investigación Académica 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            /* Antigravity HSL Palette */
            --bg: hsl(222, 47%, 4%);
            --card-bg: hsla(222, 47%, 7%, 0.95); /* Más sólido para full screen */
            --accent-primary: hsl(263, 89%, 66%);
            --accent-secondary: hsl(192, 91%, 47%);
            --text-primary: hsl(210, 40%, 98%);
            --text-secondary: hsl(215, 25%, 72%);
            --glass-border: hsla(210, 40%, 98%, 0.1);
            --glass-glow: hsla(263, 89%, 66%, 0.15);
            --card-width: 100vw;
            --card-min-height: 100vh;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-primary);
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 0% 0%, hsla(263, 89%, 66%, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, hsla(192, 91%, 47%, 0.08) 0%, transparent 50%);
            line-height: 1.6;
        }

        h1, h2, h3 {
            font-family: 'Outfit', sans-serif;
            letter-spacing: -0.02em;
        }

        /* Presentation Container - Horizontal Scroll */
        .presentation-wrapper {
            display: flex;
            flex-direction: row;
            overflow-x: hidden;
            overflow-y: hidden;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            width: 100vw;
            height: 100vh;
            -ms-overflow-style: none; /* Ocultar scrollbar */
            scrollbar-width: none;
        }

        .presentation-wrapper::-webkit-scrollbar {
            display: none;
        }

        /* Navigation Controls */
        .slide-controls {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            display: flex;
            gap: 1rem;
            z-index: 1001;
        }

        .nav-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .nav-btn:hover {
            background: var(--accent-primary);
            border-color: var(--accent-primary);
            transform: translateY(-5px);
            box-shadow: 0 15px 40px hsla(263, 89%, 66%, 0.3);
        }

        .nav-btn:active {
            transform: scale(0.95);
        }

        .nav-btn svg {
            width: 24px;
            height: 24px;
            stroke-width: 2.5px;
        }

        /* Slide as full viewport container */
        section.slide {
            flex: 0 0 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            scroll-snap-align: center;
            position: relative;
            /* Move animation only */
            transition: transform 0.8s cubic-bezier(0.77, 0, 0.175, 1);
        }

        .card {
            width: 100%;
            height: 100%;
            background: var(--card-bg);
            border: none;
            border-radius: 0;
            padding: clamp(2rem, 5vh, 5rem) clamp(2rem, 8vw, 8rem);
            display: flex;
            flex-direction: column;
            justify-content: center; /* Center content vertically */
            position: relative;
            overflow: hidden;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* Abstract Decoration */
        .card-blob {
            position: absolute;
            width: 400px;
            height: 400px;
            background: var(--accent-primary);
            filter: blur(80px);
            opacity: 0.1;
            top: -200px;
            right: -200px;
            border-radius: 50%;
            pointer-events: none;
        }

        /* Content Layout */
        .content-layout {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 2rem;
            width: 100%;
            z-index: 2;
        }

        .content-left {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .content-full {
            grid-column: span 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
        }

        .slide-header {
            margin-bottom: clamp(1rem, 3vh, 2rem);
        }

        .slide-meta {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--accent-secondary);
            margin-bottom: 0.5rem;
            display: block;
        }

        .slide-title {
            font-size: clamp(2.5rem, 6vw, 4.8rem);
            font-weight: 800;
            line-height: 1.05;
            background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .slide-subtitle {
            font-size: clamp(1.2rem, 2.5vw, 1.8rem);
            color: var(--text-secondary);
            font-weight: 400;
            margin-bottom: 1rem;
        }

        .slide-body {
            font-size: 1.4rem;
            color: var(--text-secondary);
        }

        .slide-body ul {
            list-style: none;
        }

        .slide-body li {
            margin-bottom: 1.2rem;
            padding-left: 2rem;
            position: relative;
            transition: transform 0.3s ease;
        }

        .slide-body li:hover {
            transform: translateX(10px);
            color: var(--text-primary);
        }

        .slide-body li::before {
            content: "";
            position: absolute;
            left: 0;
            top: 0.7rem;
            width: 12px;
            height: 2px;
            background: var(--accent-primary);
            box-shadow: 0 0 10px var(--accent-primary);
        }

        /* Visual Elements */
        .visual-container {
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 32px;
            padding: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
            max-height: 50vh;
            width: 100%;
        }

        .chart-container {
            width: 100%;
            height: 100%;
            min-height: 300px;
        }

        .slide-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* Highlight Boxes */
        .highlight {
            background: linear-gradient(90deg, hsla(263, 89%, 66%, 0.1), transparent);
            border-left: 4px solid var(--accent-primary);
            padding: 1.5rem;
            border-radius: 0 16px 16px 0;
            margin-top: 2rem;
        }

        .highlight-text {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--text-primary);
            font-style: italic;
        }

        /* Removed Footer / Notes as requested */
        .card-footer {
            display: none;
        }

        /* Stacking Logic Classes Removed */
        /* Transition clean up - Only movement allowed */
        .slide {
            opacity: 1 !important;
            filter: none !important;
        }

        /* Progress Bar */
        .nav-progress {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.05);
            z-index: 1000;
        }

        .nav-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            width: 0;
            box-shadow: 0 0 20px var(--accent-primary);
        }

        /* Responsive */
        @media (max-width: 900px) {
            .content-layout { grid-template-columns: 1fr; }
            .content-left { order: 1; }
            .visual-container { order: 2; height: 300px; }
            .card { padding: 2rem; }
            .slide-title { font-size: 2rem; }
        }

        /* Custom Shapes for Diagrams */
        .sor-node {
            padding: 1.5rem;
            border-radius: 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            text-align: center;
            margin: 10px;
            flex: 1;
        }
        .sor-arrow {
            color: var(--accent-primary);
            font-size: 2rem;
            display: flex;
            align-items: center;
        }

        /* Global Header Styles */
        .global-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 4rem;
            background: hsla(222, 47%, 4%, 0.7);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            z-index: 2000;
        }

        .header-logo {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.01em;
            background: linear-gradient(135deg, #fff 0%, var(--accent-primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-nav {
            display: flex;
            gap: 2rem;
        }

        .nav-link {
            text-decoration: none;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            position: relative;
            padding: 0.5rem 0;
        }

        .nav-link:hover {
            color: var(--text-primary);
        }

        .nav-link.active {
            color: var(--accent-primary);
        }

        .nav-link.active::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--accent-primary);
            box-shadow: 0 0 10px var(--accent-primary);
        }

        @media (max-width: 768px) {
            .global-header { padding: 0 2rem; }
            .header-logo { font-size: 1.2rem; }
            .header-nav { gap: 1rem; }
            .nav-link { font-size: 0.8rem; }
        }
    </style>
</head>

                        <div class="sor-node" style="border-color: var(--accent-secondary); text-align: left;">

                            <p style="font-size: 0.95rem; color: var(--text-secondary);">Validación de la <strong>Necesidad Emocional</strong>. No patologizar el gasto; aceptarlo como una herramienta de micro-resistencia ante la incertidumbre macroeconómica.</p>
                        </div>
                        <div class="sor-node" style="border-color: #fff; text-align: left;">
                            <h4 style="margin-bottom: 0.5rem;">F - Facilidad</h4>
                            <p style="font-size: 0.95rem; color: var(--text-secondary);">Implementación de <strong>Fricción Consciente</strong>. Hacer que la pausa sea tan accesible como la compra, permitiendo el retorno al pensamiento deliberativo.</p>
                        </div>
                    </div>
                    <p style="margin-top: 2.5rem; text-align: center; color: var(--accent-secondary); font-weight: 600;">Propuesta: Pivotar del Consumo Reactivo al "Consumo Consciente Emocional".</p>
                `,
                notes: "El modelo SAF no prohíbe; acompaña. Buscamos gestionar la gratificación mediante la adecuación de estímulos, aceptación emocional y facilidad en la pausa consciente."
            },
            {
                id: "conclusions",
                meta: "Sintésis Final",
                title: "Conclusiones: Un Nuevo Paradigma",
                subtitle: "Homeostasis Digital y Micro-resistencia",
                image: "assets/conclusions_human.png",
                bodyHtml: `
                    <div style="text-align: left;">
                        <p><strong>Hallazgos Finales:</strong> La investigación demuestra que la Treatonomics no es una conducta impulsiva aislada, sino una respuesta adaptativa sistemática.</p>
                        <ul style="margin-top: 1rem;">
                            <li><strong>Homeostasis:</strong> El consumo regula el malestar que el sistema no resuelve.</li>
                            <li><strong>Fragmentación:</strong> Las metas macro (ahorro) se sacrifican por la supervivencia emocional micro.</li>
                            <li><strong>Cámara de Eco:</strong> El entorno digital legitima y acelera este ciclo permanentemente.</li>
                        </ul>
                    </div>
                `,
                notes: "El análisis concluye que el bienestar inmediato se ha convertido en la nueva métrica de decisión ante un futuro económico inestable, exigiendo estrategias de mercado más empáticas."
            },
            {
                id: "limitations",
                meta: "Rigor Académico",
                title: "Limitaciones del Análisis",
                subtitle: "Alcance y Consideraciones Metodológicas",
                layout: "full",
                bodyHtml: `
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-top: 2rem; text-align: left;">
                        <div class="sor-node" style="border-color: var(--accent-primary)">
                            <h4 style="color: var(--accent-primary)">Metodología</h4>
                            <p style="font-size: 0.9rem; color: var(--text-secondary);">Dependencia de la autopercepción de los encuestados; el sesgo de memoria puede influir en la disparidad reportada del OA3.</p>
                        </div>
                        <div class="sor-node" style="border-color: var(--accent-secondary)">
                            <h4 style="color: var(--accent-secondary)">Muestra</h4>
                            <p style="font-size: 0.9rem; color: var(--text-secondary);">Enfoque exclusivo en jóvenes profesionales urbanos. Los resultados pueden variar significativamente en otros rangos etarios o contextos socioeconómicos.</p>
                        </div>
                    </div>
                    <p style="margin-top: 2rem; color: var(--text-secondary); font-style: italic; font-size: 0.9rem;">
                        * La volatilidad de los algoritmos de redes sociales (TikTok/Instagram) implica que los patrones de estímulo identificados están sujetos a cambios rápidos según las actualizaciones de las plataformas.
                    </p>
                `,
                notes: "Como toda investigación, existen limitaciones que deben considerarse al interpretar los resultados, garantizando la honestidad académica del informe."
            },
            {
                id: "preguntas",
                meta: "Cierre",
                title: "Muchas Gracias",
                subtitle: "Sesión de preguntas y feedback",
                layout: "full",
                body: "Investigación realizada por Fiorella Davila | Treatonomics 2026",
                notes: "Muchas gracias por su atención. Quedo a su disposición para profundizar en cualquier dato o aspecto de la estrategia propuesta."
            }
        ];

        const container = document.getElementById('slides-container');
        const progressBar = document.getElementById('progress-bar');

        // Render Slides
        slides.forEach((slide, index) => {
            const section = document.createElement('section');
            section.className = 'slide';
            section.id = `slide-${slide.id}`;
            section.style.zIndex = slides.length - index;

            const isFull = slide.layout === 'full';

            section.innerHTML = `
                <div class="card">
                    <div class="card-blob"></div>
                    <div class="slide-header">
                        <span class="slide-meta">${slide.meta}</span>
                        <h2 class="slide-title">${slide.title}</h2>
                        <h3 class="slide-subtitle">${slide.subtitle}</h3>
                    </div>
                    
                    <div class="content-layout">
                        <div class="${isFull ? 'content-full' : 'content-left'}">
                            <div class="slide-body">
                                ${slide.body || ''}
                                ${slide.bodyHtml || ''}
                            </div>
                        </div>
                        
                        ${!isFull ? `
                        <div class="visual-container">
                            ${slide.chart ? `<div class="chart-container"><canvas id="chart-${slide.id}"></canvas></div>` : 
                              slide.image ? `<img src="${slide.image}" alt="${slide.title}" class="slide-image">` : `
                                <div style="color: var(--accent-secondary); text-align: center;">
                                    <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.29 7 12 12 20.71 7"></polyline><line x1="12" y1="22" x2="12" y2="12"></line></svg>
                                </div>
                            `}
                        </div>
                        ` : ''}
                    </div>
                </div>
            `;
            container.appendChild(section);
        });

        // Initialize Charts
        function initCharts() {
            Chart.defaults.color = 'hsla(215, 25%, 72%, 0.8)';
            Chart.defaults.font.family = "'Inter', sans-serif";

            // OA1: Triggers Chart (from rawData.contenido)
            const ctxOA1 = document.getElementById('chart-oa1-triggers')?.getContext('2d');
            if (ctxOA1) {
                new Chart(ctxOA1, {
                    type: 'bar',
                    data: {
                        labels: ['Promociones', 'Recomendaciones', 'Videos "merecer"', 'Influencers'],
                        datasets: [{
                            data: [65, 48, 10, 15],
                            backgroundColor: ['hsla(263, 89%, 66%, 0.6)', 'hsla(192, 91%, 47%, 0.6)', 'hsla(16, 89%, 66%, 0.6)', 'hsla(45, 89%, 66%, 0.6)'],
                            borderColor: ['hsl(263, 89%, 66%)', 'hsl(192, 91%, 47%)', 'hsl(16, 89%, 66%)', 'hsl(45, 89%, 66%)'],
                            borderWidth: 2,
                            borderRadius: 8
                        }]
                    },
                    options: {
                        indexAxis: 'y',
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: { 
                            x: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' } },
                            y: { grid: { display: false } }
                        }
                    }
                });
            }

            // OA3: Dissonance Chart
            const ctx1 = document.getElementById('chart-findings-1')?.getContext('2d');
            if (ctx1) {
                new Chart(ctx1, {
                    type: 'bar',
                    data: {
                        labels: ['Importancia Ahorro', 'Coherencia Conductual'],
                        datasets: [{
                            data: [79, 35],
                            backgroundColor: ['hsla(263, 89%, 66%, 0.6)', 'hsla(192, 91%, 47%, 0.6)'],
                            borderColor: ['hsl(263, 89%, 66%)', 'hsl(192, 91%, 47%)'],
                            borderWidth: 2,
                            borderRadius: 12
                        }]
                    },
                    options: {
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: { 
                            y: { beginAtZero: true, max: 100, grid: { color: 'rgba(255,255,255,0.05)' } },
                            x: { grid: { display: false } }
                        }
                    }
                });
            }

            // OA2: Emotions Chart
            const ctx2 = document.getElementById('chart-findings-2')?.getContext('2d');
            if (ctx2) {
                new Chart(ctx2, {
                    type: 'line',
                    data: {
                        labels: ['Antes de comprar', 'Durante', 'Después'],
                        datasets: [{
                            label: 'Intensidad Emocional Positive',
                            data: [10, 85, 40],
                            borderColor: 'hsl(192, 91%, 47%)',
                            tension: 0.4,
                            fill: true,
                            backgroundColor: 'hsla(192, 91%, 47%, 0.1)'
                        }, {
                            label: 'Estrés/Ansiedad',
                            data: [70, 20, 15],
                            borderColor: 'hsl(263, 89%, 66%)',
                            tension: 0.4,
                            borderDash: [5, 5]
                        }]
                    },
                    options: {
                        maintainAspectRatio: false,
                        plugins: { legend: { position: 'bottom' } },
                        scales: { 
                            y: { display: false },
                            x: { grid: { color: 'rgba(255,255,255,0.05)' } }
                        }
                    }
                });
            }

            // OA4: Exposure Chart (from rawData.redes_freq)
            const ctxOA4 = document.getElementById('chart-oa4-exposure')?.getContext('2d');
            if (ctxOA4) {
                new Chart(ctxOA4, {
                    type: 'doughnut',
                    data: {
                        labels: ['Frecuentemente', 'A veces', 'Rara vez', 'Nunca'],
                        datasets: [{
                            data: [32, 33, 29, 6],
                            backgroundColor: ['hsla(263, 89%, 66%, 0.6)', 'hsla(192, 91%, 47%, 0.6)', 'hsla(16, 89%, 66%, 0.6)', 'hsla(215, 25%, 72%, 0.6)'],
                            borderColor: ['hsl(263, 89%, 66%)', 'hsl(192, 91%, 47%)', 'hsl(16, 89%, 66%)', 'hsl(215, 25%, 72%)'],
                            borderWidth: 2
                        }]
                    },
                    options: {
                        maintainAspectRatio: false,
                        plugins: { 
                            legend: { position: 'bottom' },
                            title: { display: false }
                        },
                        cutout: '70%'
                    }
                });
            }
        }

        // Horizontal Interaction Logic
        let currentSlide = 0;
        const totalSlides = slides.length;

        function updateProgress() {
            const progress = (currentSlide / (totalSlides - 1)) * 100;
            progressBar.style.width = `${progress}%`;
        }

        function goToSlide(index) {
            if (index < 0 || index >= totalSlides) return;
            currentSlide = index;
            const targetX = currentSlide * window.innerWidth;
            container.scrollTo({ left: targetX, behavior: 'smooth' });
            updateProgress();
        }

        // Event Listeners
        document.getElementById('next-btn').addEventListener('click', () => goToSlide(currentSlide + 1));
        document.getElementById('prev-btn').addEventListener('click', () => goToSlide(currentSlide - 1));

        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ') {
                goToSlide(currentSlide + 1);
            } else if (e.key === 'ArrowLeft') {
                goToSlide(currentSlide - 1);
            }
        });

        // Sync progress on manual resize
        window.addEventListener('resize', () => goToSlide(currentSlide));

        initCharts();
    </script>
</body>
</html>
